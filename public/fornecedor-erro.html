<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-width: 340px;
      text-align: center;
    }
    .icon { font-size: 32px; margin-bottom: 4px; }
    h2 { font-size: 16px; color: #333; font-weight: 600; }
    p { font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h2>Erro ao conectar com Handdry</h2>
    <p>Não foi possível estabelecer conexão. Tente novamente mais tarde.</p>
  </div>
</body>
</html>
